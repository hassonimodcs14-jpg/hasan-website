<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hasan | Modern Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: #222;
    }

    .hero {
      height: 100vh;
      background: url('67.jpg') no-repeat center center/cover;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.3);
    }

    .content {
      position: relative;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    p {
      font-size: 20px;
    }

    .menu {
      margin-top: 30px;
    }

    .menu a {
      margin: 10px;
      padding: 12px 20px;
      text-decoration: none;
      color: #333;
      border-radius: 25px;
      background: ;
      display: inline-block;
      transition: all 0.3s ease;
    }

    .menu a:hover {
      transform: translateY(-5px) scale(1.05);
      background: #4CAF50;
      color: ;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .section {
      padding: 60px 20px;
      text-align: center;
      background: #f4f4f4;
    }

    .card {
      margin: 20px auto;
      padding: 20px;
      max-width: 500px;
      background: white;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="overlay"></div>
  <div class="content">
    <h1>Hassoni</h1>
    <p> class="highlight-text">Student | 12 years old</p>

    <div class="menu">
      <a href="#about">About</a>
      <a href="#hobbies">Hobbies</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</div>

<div class="section" id="about">
  <div class="card">
    <h2>class="titel"About Me</h2>
    <p>I like games and computers.</p>
  </div>
</div>

<div class="section" id="hobbies">
  <div class="card">
    <h2 class="title">Hobbies</h2>
    <p>Gaming | Reading</p>
  </div>
</div>

<div class="section" id="contact">
  <div class="card">
    <h2>Contact</h2>
    <p>Email: hassonimodcs14@gmail.com</p>
  </div>
</div>

</body>
</html>
